<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Task Tracking Dashboard</title>

  <!-- Bootstrap for basic styling and layout -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Custom CSS file -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar px-4 py-3 mb-4">
    <span class="navbar-brand">Task Dashboard</span>
  </nav>

  <div class="container">

    <!-- Stats Section -->
    <div class="row mb-4">
      <div class="col-4">
        <div class="stats-box total">
          <div class="count" id="totalCount">0</div>
          <div class="label">Total</div>
        </div>
      </div>
      <div class="col-4">
        <div class="stats-box pending">
          <div class="count" id="pendingCount">0</div>
          <div class="label">Pending</div>
        </div>
      </div>
      <div class="col-4">
        <div class="stats-box done">
          <div class="count" id="completedCount">0</div>
          <div class="label">Completed</div>
        </div>
      </div>
    </div>

    <!-- Add Task Form -->
    <div class="add-task-section">
      <h5>Add New Task</h5>

      <div class="mb-2">
        <input
          type="text"
          id="titleInput"
          class="form-control"
          placeholder="Enter task title..."
        />
        <span class="error-msg" id="titleError">Title cannot be empty!</span>
      </div>

      <div class="mb-3">
        <textarea
          id="descInput"
          class="form-control"
          rows="2"
          placeholder="Enter description (optional)..."
        ></textarea>
      </div>

      <button class="btn btn-primary" onclick="submitTask()">Add Task</button>
    </div>

    <!-- Filter Buttons -->
    <div class="filter-section">
      <button class="filter-btn active" id="btn-all" onclick="filterTasks('all')">All</button>
      <button class="filter-btn" id="btn-pending" onclick="filterTasks('pending')">Pending</button>
      <button class="filter-btn" id="btn-completed" onclick="filterTasks('completed')">Completed</button>
    </div>

    <!-- Task cards will be shown here by JavaScript -->
    <div id="taskContainer"></div>

  </div>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- Load api.js first because app.js uses its functions -->
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
