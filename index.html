<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Task Dashboard</h2>

    <div class="card p-3 mb-3">
        <input type="text" id="taskInput" class="form-control mb-2" placeholder="Enter task">
        <button class="btn btn-primary" onclick="addTask()">Add Task</button>
    </div>

    <div class="mb-3 text-center">
        <button class="btn btn-secondary btn-all" onclick="filterTasks('all')">All</button>
        <button class="btn btn-warning btn-pending" onclick="filterTasks('pending')">Pending</button>
        <button class="btn btn-success btn-completed" onclick="filterTasks('completed')">Completed</button>
    </div>

    <ul class="list-group" id="taskList"></ul>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>

</body>
</html>
